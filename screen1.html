<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#3d4a3d",
                    "on-surface": "#161d16",
                    "secondary-fixed-dim": "#ffb3ad",
                    "on-primary-fixed-variant": "#005321",
                    "tertiary-container": "#ff8b7c",
                    "on-background": "#161d16",
                    "surface-container-highest": "#dce5d9",
                    "error": "#ba1a1a",
                    "background": "#f3fcef",
                    "surface-container-high": "#e2ebde",
                    "primary-fixed": "#6bff8f",
                    "surface-container-low": "#edf6ea",
                    "on-tertiary-fixed-variant": "#7f2a21",
                    "surface-dim": "#d4ddd0",
                    "tertiary": "#9e4036",
                    "surface-bright": "#f3fcef",
                    "on-secondary-fixed-variant": "#930013",
                    "outline-variant": "#bccbb9",
                    "error-container": "#ffdad6",
                    "surface-tint": "#006e2f",
                    "primary-container": "#22c55e",
                    "on-secondary": "#ffffff",
                    "outline": "#6d7b6c",
                    "inverse-on-surface": "#ebf3e7",
                    "on-error": "#ffffff",
                    "on-primary": "#ffffff",
                    "primary": "#006e2f",
                    "on-primary-fixed": "#002109",
                    "inverse-primary": "#4ae176",
                    "on-secondary-fixed": "#410004",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#ffdad7",
                    "on-primary-container": "#004b1e",
                    "surface-container": "#e8f0e4",
                    "secondary": "#b61722",
                    "inverse-surface": "#2a322a",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#ffb4a9",
                    "primary-fixed-dim": "#4ae176",
                    "on-secondary-container": "#fffbff",
                    "secondary-container": "#da3437",
                    "surface": "#f3fcef",
                    "on-tertiary-fixed": "#410001",
                    "surface-variant": "#dce5d9",
                    "on-tertiary-container": "#76231b",
                    "tertiary-fixed": "#ffdad5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-sm": "0.5rem",
                    "margin-page": "1.25rem",
                    "stack-md": "1rem",
                    "gutter-grid": "1rem",
                    "stack-lg": "1.5rem",
                    "inset-card": "1rem"
            },
            "fontFamily": {
                    "display-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "title-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3fcef;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Top App Bar (Shell Component) -->
<header class="bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-800/50 shadow-sm fixed top-0 w-full z-50 flex items-center justify-between px-5 h-16 max-w-md mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-green-600 dark:text-green-400" data-icon="schedule">schedule</span>
<h1 class="text-xl font-extrabold text-slate-900 dark:text-white">TimeTrack</h1>
</div>
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="add_circle">add_circle</span>
</button>
</header>
<!-- Background Content Mockup (to show modal context) -->
<main class="w-full max-w-md px-margin-page pt-24 pb-28 opacity-30 pointer-events-none select-none">
<div class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">Daily Overview</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Your tracking progress today.</p>
</div>
<div class="space-y-stack-md">
<!-- Sample Card 1 -->
<div class="bg-surface-container-lowest p-inset-card rounded-[16px] shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/30">
<div class="flex justify-between items-center">
<div>
<span class="font-label-caps text-label-caps text-primary bg-primary-fixed/20 px-2 py-1 rounded-full">WORK</span>
<h3 class="font-title-sm text-title-sm mt-2">Mobile UI Design</h3>
</div>
<span class="font-display-lg text-headline-md text-primary">04:20</span>
</div>
</div>
<!-- Sample Card 2 -->
<div class="bg-surface-container-lowest p-inset-card rounded-[16px] shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/30">
<div class="flex justify-between items-center">
<div>
<span class="font-label-caps text-label-caps text-tertiary bg-tertiary-fixed/30 px-2 py-1 rounded-full">PERSONAL</span>
<h3 class="font-title-sm text-title-sm mt-2">Morning Run</h3>
</div>
<span class="font-display-lg text-headline-md text-on-surface-variant">00:45</span>
</div>
</div>
<!-- Bento Grid Element (Visual Quality) -->
<div class="grid grid-cols-2 gap-stack-md">
<div class="bg-primary-container text-on-primary-container p-inset-card rounded-[16px] flex flex-col justify-between h-32">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
<span class="font-title-sm text-body-lg">85% Productivity</span>
</div>
<div class="bg-surface-container-high p-inset-card rounded-[16px] flex flex-col justify-between h-32">
<span class="material-symbols-outlined text-secondary" data-icon="pending_actions">pending_actions</span>
<span class="font-title-sm text-body-lg">3 Active Tasks</span>
</div>
</div>
</div>
</main>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-[60] flex items-center justify-center p-margin-page bg-on-surface/40 backdrop-blur-sm">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-sm rounded-[24px] shadow-[0_8px_32px_rgba(0,0,0,0.12)] border border-outline-variant/20 overflow-hidden">
<!-- Modal Image Header (Contextual Branding) -->
<div class="h-24 w-full bg-surface-container-highest relative overflow-hidden">
<img class="w-full h-full object-cover opacity-60" data-alt="A clean, minimalist workspace background featuring organized stationery and a sleek digital clock on a light-colored wooden desk. The atmosphere is calm and focused, utilizing a soft green and white color palette consistent with the TimeTrack brand. The lighting is bright and natural, suggesting a high-productivity morning environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-sCXQihQH936KjkfB7XVic4huzGV2a_F0gXXMrAU2WZyoX5O0r8wfPQqDw4m4cxBhgM1kQa_uc8XeIo_XsekvPmbY6CPmKCm1E3HpqdqQabP6R19AhbFHSXiWvSn0TqwvA6Bg2W8LaBAGitCeYkDLARLg9ycUB6_BCSrjEyp0zyVDXDFPslxrnnLBQyq-gWlqzjisi_mGTiFcpLI75-aXS2pH_qFAmZJKpriYr2Oyhm7BPZOqNWvbAz5i_xgKVsfVDxukzpVt2Ao"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest to-transparent"></div>
</div>
<div class="p-stack-lg flex flex-col gap-stack-lg">
<!-- Modal Title -->
<div class="text-center">
<h2 class="font-headline-md text-headline-md text-on-surface">Add New Section</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Create a category to organize your tasks.</p>
</div>
<!-- Input Field -->
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">NAME</label>
<input class="w-full h-14 px-inset-card rounded-[16px] border-2 border-surface-container-high bg-surface-container-low text-on-surface font-body-lg focus:border-primary focus:ring-0 outline-none transition-all placeholder:text-outline" placeholder="Section Name (e.g., Reading)" type="text"/>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-stack-sm pt-2">
<button class="h-[56px] w-full bg-primary text-on-primary rounded-[16px] font-title-sm active:scale-95 transition-transform shadow-md flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="save">save</span>
                        Save Section
                    </button>
<button class="h-[56px] w-full bg-transparent text-on-surface-variant rounded-[16px] font-title-sm hover:bg-surface-container-low active:scale-95 transition-transform flex items-center justify-center">
                        Cancel
                    </button>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Shell Component) -->
<!-- Not highlighting a specific tab because the Modal is a temporary focused layer -->
<nav class="bg-white/90 dark:bg-slate-950/90 backdrop-blur-lg border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center px-8 pb-4 z-50 max-w-md mx-auto rounded-t-2xl">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 gap-1 hover:opacity-80 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
<span class="text-[11px] font-medium uppercase tracking-wider">Tracker</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 gap-1 hover:opacity-80 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="text-[11px] font-medium uppercase tracking-wider">Reports</span>
</div>
</nav>
</body></html>
